<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Librería Virtual | Catálogo</title>
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="../static/css/styles.css">
  <script src="../static/js/scripts.js" defer></script>
</head>

<body>
  <header>
    <div class="brand">
      <h1>Librería Virtual</h1>
    </div>
    <div class="toolbar" role="group" aria-label="Herramientas">
      <span class="cart-pill" aria-live="polite" aria-atomic="true" title="Carrito">
        carrito <span id="cartCount" class="cart-count">0</span>
      </span>

      <button id="toggleTheme" class="toggle" aria-pressed="false" title="Cambiar tema">
        <span>Modo oscuro</span>
      </button>

      <nav aria-label="Navegación principal">
        <a href="index.html">Catálogo</a>
        <a href="carrito.html">Carrito</a>
        <a href="cuenta.html" id="linkCuenta">Mi Cuenta</a>
      </nav>
    </div>
  </header>

  <main class="container" id="pageCatalog">

    <section class="filters" role="search">
      <label class="sr-only" for="q">Buscar</label>
      <input id="q" type="text" placeholder="Buscar por nombre o autor…" aria-label="Buscar">

      <label class="sr-only" for="category">Categoría</label>
      <select id="category" aria-label="Filtrar por categoría">
        <option value="">Todas las categorías</option>
        <option>Programación</option>
        <option>Novela</option>
        <option>Bienestar</option>
      </select>

      <label class="sr-only" for="sort">Ordenar</label>
      <select id="sort" aria-label="Ordenar resultados">
        <option value="">Orden recomendado</option>
        <option value="price-asc">Precio: menor a mayor</option>
        <option value="price-desc">Precio: mayor a menor</option>
      </select>

      <button id="btnClear" title="Limpiar filtros">Limpiar</button>
    </section>

    <section id="catalogo" class="catalog" aria-live="polite" aria-busy="false"></section>

    <div id="emptyState" class="empty" hidden>
      Sin resultados. Prueba con otros filtros o revisa la base de datos.
    </div>

    <template id="cardTemplate">
      <article class="book-card">
        <span class="category-tag" data-category></span>
        <img data-img alt="" loading="lazy" />
        <div class="book-info">
          <h3 data-title></h3>
          <p class="author" data-author></p>
          <p data-desc style="display:none;"></p>
        </div>
        <p class="price" data-price></p>
        <div class="actions">
          <button class="btn btn-primary" data-add>Añadir al Carrito</button>
        </div>
      </article>
    </template>

  </main>

  <footer>
    <p>&copy; 2026 Librería Virtual - Proyecto TFG - Aaron, Bruno y Lucas</p>
  </footer>
</body>

</html>
