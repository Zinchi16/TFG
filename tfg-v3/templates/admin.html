<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Librería Virtual | Panel Admin</title>
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="../static/css/styles.css">
    <script src="../static/js/scripts.js" defer></script>
</head>

<body>
    <header>
        <div class="brand">
            <h1>Librería Virtual</h1>
        </div>
        <div class="toolbar">
            <span class="cart-pill" title="Carrito">carrito <span id="cartCount" class="cart-count">0</span></span>
            <button id="toggleTheme" class="toggle"><span>Modo oscuro</span></button>
            <nav>
                <a href="index.html">Catálogo</a>
                <a href="carrito.html">Carrito</a>
                <a href="cuenta.html" id="linkCuenta">Mi Cuenta</a>
            </nav>
        </div>
    </header>

    <main class="container" id="pageAdmin">
        <h2 style="color: var(--focus);">Panel de Control Administrador</h2>

        <div class="grid-2">
            <section class="card">
                <h3>Añadir Nuevo Libro</h3>
                <form id="formAñadirLibro" style="display: flex; flex-direction: column; gap: 10px;">
                    <input id="adminTitulo" type="text" placeholder="Título del libro" required>
                    <input id="adminAutor" type="text" placeholder="Autor" required>
                    <input id="adminDesc" type="text" placeholder="Descripción breve" required>
                    <input id="adminPrecio" type="number" step="0.01" placeholder="Precio (ej: 15.99)" required>
                    <select id="adminCat" class="filters" style="width:100%; border:1px solid var(--border);" required>
                        <option value="">Selecciona Categoría...</option>
                        <option value="Programación">Programación</option>
                        <option value="Novela">Novela</option>
                        <option value="Bienestar">Bienestar</option>
                    </select>
                    <input id="adminImg" type="text" placeholder="URL de la imagen (ej: /static/uploads/foto.jpeg)">
                    <button type="submit" class="btn btn-primary">Guardar Libro</button>
                </form>
            </section>

            <section class="card">
                <h3>Catálogo Actual</h3>
                <div id="listaLibrosAdmin" class="cart-list" style="max-height: 400px; overflow-y: auto;">
                </div>
            </section>
        </div>
    </main>
</body>

</html>
